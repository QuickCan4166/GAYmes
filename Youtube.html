<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=YouTube+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #272727;
  --surface3: #3f3f3f;
  --border: rgba(255,255,255,0.1);
  --text: #f1f1f1;
  --muted: #aaaaaa;
  --red: #ff0000;
  --red-dark: #cc0000;
  --radius: 12px;
  --nav-h: 56px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  position: fixed;
  top: var(--nav-h);
  left: 0;
  bottom: 0;
  width: 240px;
  background: var(--bg);
  padding: 12px 0;
  z-index: 50;
  overflow-y: auto;
  scrollbar-width: none;
  transition: transform 0.25s ease;
}

#sidebar::-webkit-scrollbar { display: none; }

.sidebar-section { padding: 0 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.sidebar-section:last-child { border-bottom: none; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 24px;
  cursor: pointer;
  border-radius: 10px;
  margin: 0 8px;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
  text-decoration: none;
}

.sidebar-item:hover { background: var(--surface2); }
.sidebar-item.active { background: var(--surface2); font-weight: 500; }

.sidebar-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}

.sidebar-label { font-size: 14px; }
.sidebar-heading { padding: 8px 24px 4px; font-size: 14px; font-weight: 600; color: var(--text); }

/* ── TOP NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

.menu-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.menu-btn:hover { background: var(--surface2); }

.yt-logo {
  display: flex;
  align-items: center;
  gap: 4px;
  text-decoration: none;
  flex-shrink: 0;
}

.yt-logo-icon {
  background: var(--red);
  border-radius: 6px;
  width: 34px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.yt-logo-icon svg { width: 20px; height: 14px; }

.yt-logo-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
  font-family: 'Roboto', sans-serif;
}

.search-wrap {
  display: flex;
  flex: 1;
  max-width: 560px;
  margin: 0 auto;
}

#search-input {
  flex: 1;
  height: 40px;
  padding: 0 16px;
  background: var(--bg);
  border: 1px solid var(--surface3);
  border-right: none;
  border-radius: 40px 0 0 40px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Roboto', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}

#search-input:focus { border-color: #1c62b9; box-shadow: inset 0 0 0 1px #1c62b9; }
#search-input::placeholder { color: var(--muted); }

#search-btn {
  height: 40px;
  width: 64px;
  background: var(--surface2);
  border: 1px solid var(--surface3);
  border-radius: 0 40px 40px 0;
  color: var(--text);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

#search-btn:hover { background: var(--surface3); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  margin-left: auto;
}

.nav-icon-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: background 0.15s;
  position: relative;
}

.nav-icon-btn:hover { background: var(--surface2); }

/* ── MAIN CONTENT ── */
#main {
  margin-top: var(--nav-h);
  margin-left: 240px;
  min-height: calc(100vh - var(--nav-h));
  transition: margin-left 0.25s ease;
}

/* ── CHIPS ── */
#chips-wrap {
  position: sticky;
  top: var(--nav-h);
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

#chips {
  display: flex;
  gap: 8px;
  padding: 10px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
#chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 8px;
  background: var(--surface2);
  border: none;
  color: var(--text);
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.chip:hover { background: var(--surface3); }
.chip.active { background: var(--text); color: var(--bg); font-weight: 500; }

/* ── PLAYER ── */
#player-section {
  display: none;
  padding: 16px 20px;
  background: var(--bg);
}

#player-section.visible { display: block; }

.player-container {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 24px;
  max-width: 1400px;
}

#player-box {
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
}

#player-frame {
  width: 100%;
  aspect-ratio: 16/9;
  display: block;
  border: none;
  background: #000;
}

.player-info {
  margin-top: 12px;
}

.player-video-title {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 12px;
}

.player-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

/* Method switcher */
.method-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border-radius: 20px;
  padding: 4px 6px;
  flex-wrap: wrap;
}

.method-label {
  font-size: 12px;
  color: var(--muted);
  padding: 0 6px;
  white-space: nowrap;
}

.method-btn {
  padding: 5px 12px;
  border-radius: 14px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Roboto', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.method-btn:hover { background: var(--surface3); color: var(--text); }
.method-btn.active { background: var(--red); color: #fff; font-weight: 500; }

.method-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 10px;
  font-weight: 500;
}
.method-status.ok { background: rgba(0,200,80,0.15); color: #00c850; }
.method-status.err { background: rgba(255,50,50,0.15); color: #ff5050; }
.method-status.loading { background: rgba(255,200,0,0.12); color: #ffc800; }

.close-btn {
  margin-left: auto;
  background: var(--surface2);
  border: none;
  border-radius: 20px;
  color: var(--muted);
  font-size: 13px;
  padding: 6px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.close-btn:hover { background: var(--surface3); color: var(--text); }

/* Up next sidebar */
.up-next-panel {
  overflow-y: auto;
  max-height: calc(100vh - 180px);
  scrollbar-width: thin;
}

.up-next-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.up-next-card {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  transition: background 0.15s;
}
.up-next-card:hover { background: var(--surface2); padding-left: 8px; margin: 0 -8px; }

.up-next-thumb {
  flex-shrink: 0;
  width: 120px;
  height: 68px;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
  position: relative;
}
.up-next-thumb img { width: 100%; height: 100%; object-fit: cover; }
.up-next-info { flex: 1; min-width: 0; }
.up-next-vtitle { font-size: 13px; font-weight: 500; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.up-next-channel { font-size: 12px; color: var(--muted); }

/* ── VIDEO GRID ── */
#content-area { padding: 20px; }

#video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 16px;
}

.video-card {
  cursor: pointer;
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.15s;
}
.video-card:hover { transform: translateY(-2px); }

.thumb-wrap {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #000;
  border-radius: var(--radius);
  margin-bottom: 10px;
}
.thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.25s ease;
}
.video-card:hover .thumb-wrap img { transform: scale(1.03); }

.play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}
.video-card:hover .play-overlay { opacity: 1; }

.play-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.play-triangle {
  width: 0; height: 0;
  border-style: solid;
  border-width: 10px 0 10px 20px;
  border-color: transparent transparent transparent #fff;
  margin-left: 4px;
}

.video-card-body { display: flex; gap: 12px; }

.channel-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  overflow: hidden;
}

.channel-avatar img { width: 100%; height: 100%; object-fit: cover; }

.video-meta { flex: 1; min-width: 0; }
.video-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  color: var(--text);
}
.video-channel { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
.video-channel:hover { color: var(--text); }
.video-views { font-size: 13px; color: var(--muted); }

/* ── STATUS + PAGINATION ── */
#status {
  text-align: center;
  padding: 3rem 0;
  color: var(--muted);
  font-size: 14px;
}

.spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 3px solid var(--surface3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#page-nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 28px;
  padding-bottom: 40px;
}

#page-nav button {
  padding: 10px 24px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  transition: background 0.15s;
}
#page-nav button:hover { background: var(--surface3); }

/* ── SIDEBAR COLLAPSED ── */
body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
body.sidebar-collapsed #main { margin-left: 0; }

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .player-container { grid-template-columns: 1fr; }
  .up-next-panel { max-height: 300px; }
}

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #main { margin-left: 0; }
  #video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .video-title { font-size: 13px; }
}

/* Skeleton loading animation */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}

@keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>

};

function toggleSidebar() {

function chipClick(el, query) {

  doSearch(undefined, query);
}

function chipSearch(el, query) {
  if (el) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }
  doSearch(undefined, query);
}

async function doSearch(pageToken, overrideQuery) {
  const query = overrideQuery || document.getElementById('search-input').value.trim() || 'trending';
  if (!pageToken) { prevTokens = []; lastQuery = query; }
  else lastQuery = query;

  setStatus('<div class="spinner"></div><br>Loading...');
  document.getElementById('video-grid').innerHTML = '';
  document.getElementById('page-nav').innerHTML = '';

  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(query)}&key=${API_KEY}`;
  if (pageToken) url += `&pageToken=${pageToken}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { setStatus('⚠️ API error: ' + data.error.message); return; }
    const items = data.items || [];
    if (!items.length) { setStatus('No results found.'); return; }
    allItems = items;
    setStatus('');
    renderVideos(items);
    renderPageNav(data.nextPageToken, pageToken);
  } catch(e) {
    setStatus('⚠️ Network error. The API might be blocked. Try searching again.');
  }
}

function renderVideos(items) {
  const grid = document.getElementById('video-grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const id = item.id.videoId;
    const title = item.snippet.title;
    const channel = item.snippet.channelTitle;
    const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '';
    const initial = channel.charAt(0).toUpperCase();

    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${thumb}" alt="" loading="lazy" />
        <div class="play-overlay"><div class="play-circle"><div class="play-triangle"></div></div></div>
      </div>
      <div class="video-card-body">
        <div class="channel-avatar">${initial}</div>
        <div class="video-meta">
          <div class="video-title">${esc(title)}</div>
          <div class="video-channel">${esc(channel)}</div>
          <div class="video-views">YouTube</div>
        </div>
      </div>`;
    card.onclick = () => openPlayer(id, title, items);
    grid.appendChild(card);
  });
}

function renderUpNext(currentId, items) {
  const list = document.getElementById('up-next-list');
  list.innerHTML = '';
  const others = items.filter(i => i.id.videoId !== currentId).slice(0, 12);
  others.forEach(item => {
    const id = item.id.videoId;
    const title = item.snippet.title;
    const channel = item.snippet.channelTitle;
    const thumb = item.snippet.thumbnails?.default?.url || '';
    const card = document.createElement('div');
    card.className = 'up-next-card';
    card.innerHTML = `
      <div class="up-next-thumb"><img src="${thumb}" alt="" loading="lazy"/></div>
      <div class="up-next-info">
        <div class="up-next-vtitle">${esc(title)}</div>
        <div class="up-next-channel">${esc(channel)}</div>
      </div>`;
    card.onclick = () => openPlayer(id, title, items);
    list.appendChild(card);
  });
}

function openPlayer(videoId, title, items) {
  currentVideoId = videoId;
  currentMethod = 'nocookie';

  // Activate first method btn
  Object.keys(METHODS).forEach(k => document.getElementById('m-' + k).classList.remove('active'));
  document.getElementById('m-nocookie').classList.add('active');

  document.getElementById('player-frame').src = METHODS[currentMethod].url(videoId);
  document.getElementById('player-title').textContent = title;
  document.getElementById('method-status').className = 'method-status loading';
  document.getElementById('method-status').textContent = 'Loading...';

  const section = document.getElementById('player-section');
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (items) renderUpNext(videoId, items);

  // Check load after delay (rough heuristic)
  setTimeout(() => {
    const status = document.getElementById('method-status');
    if (status && status.textContent === 'Loading...') {
      status.className = 'method-status ok';
      status.textContent = '✓ Playing';
    }
  }, 2500);
}

function switchMethod(key) {
  currentMethod = key;
  Object.keys(METHODS).forEach(k => document.getElementById('m-' + k).classList.remove('active'));
  document.getElementById('m-' + key).classList.add('active');

  const status = document.getElementById('method-status');
  status.className = 'method-status loading';
  status.textContent = 'Switching...';

  document.getElementById('player-frame').src = METHODS[key].url(currentVideoId);

  setTimeout(() => {
    status.className = 'method-status ok';
    status.textContent = '✓ Switched';
  }, 1800);
}

function closePlayer() {
  document.getElementById('player-frame').src = '';
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('method-status').textContent = '';
}

function renderPageNav(nextTok, currentTok) {
  const nav = document.getElementById('page-nav');
  if (currentTok) {
    const prev = document.createElement('button');
    prev.textContent = '← Previous';
    prev.onclick = () => { const t = prevTokens.pop(); doSearch(t || undefined, lastQuery); };
    nav.appendChild(prev);
  }
  if (nextTok) {
    const next = document.createElement('button');
    next.textContent = 'Next →';
    next.onclick = () => { if (currentTok) prevTokens.push(currentTok); doSearch(nextTok, lastQuery); };
    nav.appendChild(next);
  }
}

function setStatus(msg) {
  const s = document.getElementById('status');
  s.innerHTML = msg;
  s.style.display = msg ? 'block' : 'none';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
