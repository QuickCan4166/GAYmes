<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Search Embed</title>
<style>
  body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; }
  #searchBar { display: flex; justify-content: center; margin-bottom: 20px; }
  #searchBar input {
    padding: 10px;
    width: 300px;
    border-radius: 5px 0 0 5px;
    border: none;
    font-size: 16px;
  }
  #searchBar button {
    padding: 10px 15px;
    border: none;
    border-radius: 0 5px 5px 0;
    background-color: #ff0000;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }
  #videoContainer { display: flex; justify-content: center; margin-bottom: 20px; }
  #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
  .video-tile { cursor: pointer; background: #1f1f2e; border-radius: 10px; overflow: hidden; text-align: center; transition: transform 0.2s; }
  .video-tile:hover { transform: scale(1.05); }
  .video-tile img { width: 100%; height: 120px; object-fit: cover; }
  .video-tile h3 { font-size: 14px; padding: 5px; color: #ffcc00; }
</style>
</head>
<body>

<h1>YouTube Video Search</h1>

<div id="searchBar">
  <input type="text" id="ytQuery" placeholder="Search YouTube videos">
  <button onclick="searchYouTube()">Search</button>
</div>

<div id="videoContainer"></div>
<div id="results"></div>

<script>
const API_KEY = 'YOUR_API_KEY_HERE';

async function searchYouTube() {
  const query = document.getElementById('ytQuery').value.trim();
  if (!query) return alert('Enter a search term!');

  const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=15&q=${encodeURIComponent(query)}&key=${API_KEY}`);
  const data = await response.json();

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '';
  const videoContainer = document.getElementById('videoContainer');
  videoContainer.innerHTML = '';

  data.items.forEach(item => {
    const videoId = item.id.videoId;
    const title = item.snippet.title;
    const thumbnail = item.snippet.thumbnails.medium.url;

    const tile = document.createElement('div');
    tile.className = 'video-tile';
    tile.innerHTML = `
      <img src="${thumbnail}" alt="${title}">
      <h3>${title}</h3>
    `;

    tile.addEventListener('click', () => {
      videoContainer.innerHTML = `
        <iframe width="1000" height="560"
          src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&fs=1&playsinline=0"
          frameborder="0"
          allow="autoplay; fullscreen; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
      videoContainer.scrollIntoView({ behavior: 'smooth' });
    });

    resultsDiv.appendChild(tile);
  });
}
</script>

</body>
</html>
