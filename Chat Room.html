<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gayme Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .msg {
    background: #222;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
  }

  .name {
    font-weight: bold;
    color: #4ec3ff;
  }

  #bottom {
    display: flex;
    padding: 10px;
    background: #000;
    gap: 10px;
  }

  #msgInput {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
  }

  #sendBtn {
    padding: 10px 16px;
    border: none;
    background: #4ec3ff;
    color: black;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="messages"></div>

<div id="bottom">
  <input id="msgInput" placeholder="Type your message...">
  <button id="sendBtn">Send</button>
</div>

<!-- Firebase SDKs -->
<script type="module">

  // Firebase imports
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js";

  // Your Firebase config (fixed + correct URL)
  const firebaseConfig = {
    apiKey: "AIzaSyB5xlP1LhkCm-M9G7CJX_2PtnBF0m4xl10",
    authDomain: "gayme-chat.firebaseapp.com",
    databaseURL: "https://gayme-chat-default-rtdb.firebaseio.com",
    projectId: "gayme-chat",
    storageBucket: "gayme-chat.firebasestorage.app",
    messagingSenderId: "451326760196",
    appId: "1:451326760196:web:d47125c738cba504a86c51",
    measurementId: "G-3JQRFC7V1V"
  };

  // Init Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getDatabase(app);

  // Random silly username generator
  function randomName() {
    const a = ["Blue", "Silly", "Ultra", "Mega", "Pixel", "Quantum"];
    const b = ["Dog", "Cat", "Frog", "Penguin", "Wizard", "Knight"];
    return a[Math.floor(Math.random()*a.length)] +
           b[Math.floor(Math.random()*b.length)] +
           "#" + Math.floor(Math.random()*9999);
  }

  const myName = randomName();

  //----------------------------------------------------------
  // Sending messages
  //----------------------------------------------------------

  const sendBtn = document.getElementById("sendBtn");
  const msgInput = document.getElementById("msgInput");

  sendBtn.addEventListener("click", () => {
    const text = msgInput.value.trim();
    if (!text) return;

    push(ref(db, "messages"), {
      name: myName,
      text: text,
      ts: serverTimestamp()
    });

    msgInput.value = "";
  });

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendBtn.click();
  });

  //----------------------------------------------------------
  // Receiving messages
  //----------------------------------------------------------

  const messagesDiv = document.getElementById("messages");

  function escapeHTML(str) {
    return str.replace(/[&<>"']/g, s => ({
      "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
    }[s]));
  }

  onChildAdded(ref(db, "messages"), snap => {
    const data = snap.val();
    if (!data) return;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML =
      `<div class="name">${escapeHTML(data.name)}</div>
       <div class="text">${escapeHTML(data.text)}</div>`;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

</script>

</body>
</html>
